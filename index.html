<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 👇 구글이 말한 <head> 요소 '바로 다음' 위치는 여기입니다! 👇 -->
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DBKJN8MD8J"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DBKJN8MD8J');
    </script>
    <!-- 👆 구글 태그 끝 👆 -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETA & Strategy Media Hub</title>
    <!-- 설치가 필요 없는 온라인 Tailwind CSS 라이브러리 연결 -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <!-- 상단 헤더 영역 -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-indigo-600">etaclub.kr</h1>
            <p class="text-xs text-gray-500">기업 전략 & ETA 미디어 큐레이션</p>
        </div>
    </header>

    <!-- 메인 대시보드 콘텐츠 영역 -->
    <main class="max-w-6xl mx-auto px-4 py-10">
        <div class="mb-8">
            <h2 class="text-2xl font-extrabold text-gray-900 sm:text-3xl">Media Channels</h2>
            <p class="mt-2 text-sm text-gray-600">원하는 미디어를 클릭하면 해당 채널의 공식 사이트로 이동합니다.</p>
        </div>

        <!-- 자바스크립트가 네모 박스 카드를 자동으로 채워 넣을 부모 박스 -->
        <div id="channel-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- script.js에 의해 이곳에 카드가 동적으로 주입됩니다 -->
        </div>
    </main>

    <!-- 동적 흐름을 제어할 백엔드 스크립트 연결 -->
    <script src="script.js"></script>
</body>
</html>
